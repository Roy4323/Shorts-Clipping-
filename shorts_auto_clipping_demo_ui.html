<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Shorts Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">

  <div class="w-full max-w-2xl p-6">
    <h1 class="text-3xl font-bold text-center mb-6">🎬 AI Shorts Auto-Clipping</h1>

    <div class="bg-gray-800 rounded-2xl p-6 shadow-lg">
      <label class="block mb-2 text-sm">YouTube URL</label>
      <input id="urlInput" type="text" placeholder="Paste YouTube link..."
        class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none" />

      <button onclick="startProcessing()"
        class="mt-4 w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-semibold">
        Generate Shorts
      </button>

      <div id="status" class="mt-4 text-sm text-gray-400 hidden">
        Status: <span id="statusText">Idle</span>
      </div>

      <div id="progressContainer" class="mt-4 hidden">
        <div class="w-full bg-gray-700 rounded-full h-2">
          <div id="progressBar" class="bg-blue-500 h-2 rounded-full" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <div id="result" class="mt-6 hidden">
      <h2 class="text-xl font-semibold mb-2">Generated Clip</h2>
      <video id="videoPlayer" controls class="w-full rounded-lg"></video>

      <div class="mt-3 bg-gray-800 p-4 rounded-lg">
        <p><strong>Reason:</strong> <span id="reason"></span></p>
        <p><strong>Duration:</strong> <span id="duration"></span></p>
      </div>
    </div>
  </div>

  <script>
    async function startProcessing() {
      const url = document.getElementById('urlInput').value;
      if (!url) return alert("Please enter a URL");

      document.getElementById('status').classList.remove('hidden');
      document.getElementById('progressContainer').classList.remove('hidden');
      document.getElementById('statusText').innerText = "Starting...";

      // Step 1: Call backend
      const res = await fetch('/api/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const data = await res.json();
      const jobId = data.job_id;

      pollStatus(jobId);
    }

    async function pollStatus(jobId) {
      const stages = [
        'queued','downloading','transcribing','scoring','clipping','reframing','subtitles','done'
      ];

      const interval = setInterval(async () => {
        const res = await fetch(`/api/status/${jobId}`);
        const data = await res.json();

        document.getElementById('statusText').innerText = data.status;

        const progress = (stages.indexOf(data.status) / (stages.length - 1)) * 100;
        document.getElementById('progressBar').style.width = progress + '%';

        if (data.status === 'done') {
          clearInterval(interval);
          loadResult(jobId);
        }
      }, 2000);
    }

    async function loadResult(jobId) {
      const res = await fetch(`/api/result/${jobId}`);
      const data = await res.json();

      document.getElementById('result').classList.remove('hidden');
      document.getElementById('videoPlayer').src = data.clip_url;
      document.getElementById('reason').innerText = data.reason;
      document.getElementById('duration').innerText = data.duration + ' sec';
    }
  </script>

</body>
</html>
